<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金估值查询系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .search-box input {
            flex: 1;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .search-box input:focus {
            border-color: #667eea;
        }
        
        .search-box button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .result-card {
            display: none;
        }
        
        .result-card.show {
            display: block;
        }
        
        .fund-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .quote-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .quote-item {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .quote-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
        }
        
        .quote-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
        }
        
        .quote-value.positive {
            color: #e74c3c;
        }
        
        .quote-value.negative {
            color: #27ae60;
        }
        
        /* 图表区域 */
        .chart-section {
            margin-top: 30px;
        }
        
        .chart-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        
        .chart-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .chart-tab {
            padding: 8px 16px;
            font-size: 14px;
            background: #e9ecef;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .chart-tab:hover, .chart-tab.active {
            background: #667eea;
            color: white;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .history-date {
            color: #666;
        }
        
        .history-value {
            font-weight: 600;
            color: #333;
        }
        
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        .nav a {
            display: inline-block;
            padding: 12px 30px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            transition: background 0.3s;
        }
        
        .nav a:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            text-align: center;
            padding: 20px;
            color: #e74c3c;
            background: #fdeaea;
            border-radius: 10px;
        }
        
        .update-time {
            text-align: center;
            color: #999;
            font-size: 0.85rem;
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .update-time.show {
            display: block;
        }
        
        /* Toast notification */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: 80%;
            text-align: center;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .toast.success {
            background: #27ae60;
        }
        
        .toast.error {
            background: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 基金估值查询</h1>
            <p>输入基金代码，查询实时估值和历史净值</p>
        </div>
        
        <div class="card">
            <form id="queryForm">
                <div class="search-box">
                    <input type="text" id="fundCode" name="fundCode" placeholder="请输入基金代码（如：161039）">
                    <button type="submit">查询</button>
                </div>
            </form>
            
            <div id="loading" class="loading" style="display: none;">
                正在查询，请稍候...
            </div>
            
            <div id="error" class="error" style="display: none;"></div>
            
            <div id="result" class="result-card">
                <div class="fund-name" id="fundName">-</div>
                
                <div class="quote-grid">
                    <div class="quote-item">
                        <div class="quote-label">单位净值</div>
                        <div class="quote-value" id="dwjz">-</div>
                    </div>
                    <div class="quote-item">
                        <div class="quote-label">涨跌幅</div>
                        <div class="quote-value" id="zzjz">-</div>
                    </div>
                    <div class="quote-item">
                        <div class="quote-label">净值变化</div>
                        <div class="quote-value" id="changeDwjz">-</div>
                    </div>
                    <div class="quote-item">
                        <div class="quote-label">基金代码</div>
                        <div class="quote-value" id="code">-</div>
                    </div>
                </div>
                
                <!-- 更新时间 -->
                <div class="update-time" id="updateTime" style="display: none;">
                    更新时间：<span></span>
                </div>
                
                <!-- 7天涨跌幅折线图 -->
                <div class="chart-section">
                    <div class="chart-title">📊 7日涨跌幅走势</div>
                    <div class="chart-tabs">
                        <button class="chart-tab active" onclick="switchChart('nav')">净值走势</button>
                        <button class="chart-tab" onclick="switchChart('change')">涨跌幅</button>
                    </div>
                    <div class="chart-container">
                        <canvas id="navChart"></canvas>
                    </div>
                </div>
                
                <!-- 历史净值列表 -->
                <div class="history-title" style="margin-top: 20px; font-size: 1.2rem; font-weight: 600; color: #333; margin-bottom: 15px;">历史净值</div>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
        
        <!-- 导航 -->
        <div class="nav">
            <a href="/">🏠 首页 - 基金查询</a>
            <a href="/hold">💼 持仓管理</a>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        let historyData = [];
        let currentChartType = 'nav';
        let navChart = null;
        
        // 表单提交
        document.getElementById('queryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fundCode = document.getElementById('fundCode').value.trim();
            
            if (!fundCode || !/^\d{6}$/.test(fundCode)) {
                showToast('请输入6位基金代码', 'error');
                return;
            }
            
            await queryFund(fundCode);
        });
        
        async function queryFund(fundCode) {
            showLoading();
            
            try {
                // 获取实时估值
                const quoteRes = await fetch('/api/fund/quote?fundCode=' + fundCode);
                const quoteData = await quoteRes.json();
                
                if (!quoteData.success) {
                    showError(quoteData.message || '未找到该基金');
                    return;
                }
                
                displayQuote(quoteData);
                
                // 获取历史数据
                const historyRes = await fetch('/api/fund/history?fundCode=' + fundCode + '&days=7');
                const history = await historyRes.json();
                
                historyData = history;
                displayHistory(history);
                
                showResult();
            } catch (e) {
                showError('查询失败: ' + e.message);
            } finally {
                hideLoading();
            }
        }
        
        function displayQuote(data) {
            document.getElementById('fundName').textContent = data.fundName || data.fundCode;
            document.getElementById('dwjz').textContent = data.dwjz || '-';
            document.getElementById('code').textContent = data.fundCode;
            
            const updateTimeEl = document.getElementById('updateTime');
            if (data.updateTime) {
                updateTimeEl.querySelector('span').textContent = data.updateTime;
                updateTimeEl.classList.add('show');
            } else {
                updateTimeEl.classList.remove('show');
            }
            
            const zzjz = data.zzjz;
            const zzjzEl = document.getElementById('zzjz');
            if (zzjz !== undefined && zzjz !== null) {
                const sign = zzjz >= 0 ? '+' : '';
                zzjzEl.textContent = sign + zzjz + '%';
                zzjzEl.className = 'quote-value ' + (zzjz >= 0 ? 'positive' : 'negative');
            } else {
                zzjzEl.textContent = '-';
                zzjzEl.className = 'quote-value';
            }
            
            const changeDwjz = data.changeDwjz;
            const changeDwjzEl = document.getElementById('changeDwjz');
            if (changeDwjz !== undefined && changeDwjz !== null) {
                const sign = changeDwjz >= 0 ? '+' : '';
                changeDwjzEl.textContent = sign + changeDwjz;
                changeDwjzEl.className = 'quote-value ' + (changeDwjz >= 0 ? 'positive' : 'negative');
            } else {
                changeDwjzEl.textContent = '-';
                changeDwjzEl.className = 'quote-value';
            }
        }
        
        // 切换图表类型
        function switchChart(type) {
            currentChartType = type;
            
            // 更新按钮状态
            document.querySelectorAll('.chart-tab').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 重新绘制图表
            drawChart();
        }
        
        // 绘制图表
        function drawChart() {
            const ctx = document.getElementById('navChart').getContext('2d');
            
            // 销毁旧图表
            if (navChart) {
                navChart.destroy();
            }
            
            if (!historyData || historyData.length === 0) return;
            
            // 反转数据顺序（让日期从左到右递增）
            const chartData = [...historyData].reverse();
            
            const labels = chartData.map(d => d.date);
            
            let datasets;
            let yAxisLabel;
            
            if (currentChartType === 'nav') {
                // 净值走势
                datasets = [{
                    label: '单位净值',
                    data: chartData.map(d => d.dwjz),
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 4,
                    pointBackgroundColor: '#667eea'
                }];
                yAxisLabel = '净值';
            } else {
                // 涨跌幅
                datasets = [{
                    label: '涨跌幅 (%)',
                    data: chartData.map(d => d.changeRate || 0),
                    borderColor: '#f5576c',
                    backgroundColor: chartData.map(d => (d.changeRate || 0) >= 0 ? 'rgba(231, 76, 60, 0.1)' : 'rgba(39, 174, 96, 0.1)'),
                    fill: true,
                    tension: 0.4,
                    pointRadius: 4,
                    pointBackgroundColor: chartData.map(d => (d.changeRate || 0) >= 0 ? '#e74c3c' : '#27ae60')
                }];
                yAxisLabel = '涨跌幅 (%)';
            }
            
            navChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    if (currentChartType === 'nav') {
                                        return '净值: ' + context.parsed.y.toFixed(4);
                                    } else {
                                        const value = context.parsed.y;
                                        return '涨跌幅: ' + (value >= 0 ? '+' : '') + value.toFixed(2) + '%';
                                    }
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false
                            }
                        },
                        y: {
                            grid: {
                                color: '#e0e0e0'
                            },
                            title: {
                                display: true,
                                text: yAxisLabel
                            }
                        }
                    }
                }
            });
        }
        
        function displayHistory(data) {
            const container = document.getElementById('historyList');
            container.innerHTML = '';
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="history-item"><span>暂无历史数据</span></div>';
                return;
            }
            
            // 绘制图表
            drawChart();
            
            // 显示历史列表
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                const changeRate = item.changeRate || 0;
                div.innerHTML = `
                    <span class="history-date">${item.date}</span>
                    <span class="history-value ${changeRate >= 0 ? 'positive' : 'negative'}">
                        ${item.dwjz.toFixed(4)} 
                        (${changeRate >= 0 ? '+' : ''}${changeRate.toFixed(2)}%)
                    </span>
                `;
                container.appendChild(div);
            });
        }
        
        function showToast(message, type) {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').classList.remove('show');
            document.getElementById('error').style.display = 'none';
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
        
        function showError(msg) {
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
            document.getElementById('result').classList.remove('show');
        }
        
        function showResult() {
            document.getElementById('result').classList.add('show');
        }
    </script>
</body>
</html>
