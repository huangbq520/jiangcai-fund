<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金估值查询系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .search-box input {
            flex: 1;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .search-box input:focus {
            border-color: #667eea;
        }
        
        .search-box button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .result-card {
            display: none;
        }
        
        .result-card.show {
            display: block;
        }
        
        .fund-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .quote-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .quote-item {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .quote-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
        }
        
        .quote-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
        }
        
        .quote-value.positive {
            color: #ef4444;
        }
        
        .quote-value.negative {
            color: #22c55e;
        }
        
        /* 图表区域 */
        .chart-section {
            margin-top: 30px;
        }
        
        .chart-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        
        .chart-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .chart-tab {
            padding: 8px 16px;
            font-size: 14px;
            background: #e9ecef;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .chart-tab:hover, .chart-tab.active {
            background: #667eea;
            color: white;
        }
        
        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
        }
        
        /* 历史净值列表 */
        .history-section {
            margin-top: 30px;
        }
        
        .history-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 320px;
            overflow-y: auto;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: background 0.2s;
        }
        
        .history-item:hover {
            background: #e9ecef;
        }
        
        .history-date {
            color: #666;
            font-size: 0.9rem;
        }
        
        .history-nav {
            color: #333;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .history-change {
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .change-positive {
            color: #ef4444;
        }
        
        .change-negative {
            color: #22c55e;
        }
        
        .change-zero {
            color: #9ca3af;
        }
        
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        .nav a {
            display: inline-block;
            padding: 12px 30px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            transition: background 0.3s;
        }
        
        .nav a:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            text-align: center;
            padding: 20px;
            color: #ef4444;
            background: #fef2f2;
            border-radius: 10px;
        }
        
        .update-time {
            text-align: center;
            color: #999;
            font-size: 0.85rem;
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .update-time.show {
            display: block;
        }
        
        /* Toast notification */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: 80%;
            text-align: center;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .toast.success {
            background: #22c55e;
        }
        
        .toast.error {
            background: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 基金估值查询</h1>
            <p>输入基金代码，查询实时估值和历史净值</p>
        </div>
        
        <div class="card">
            <form id="queryForm">
                <div class="search-box">
                    <input type="text" id="fundCode" name="fundCode" placeholder="请输入基金代码（如：161039）">
                    <button type="submit">查询</button>
                </div>
            </form>
            
            <div id="loading" class="loading" style="display: none;">
                正在查询，请稍候...
            </div>
            
            <div id="error" class="error" style="display: none;"></div>
            
            <div id="result" class="result-card">
                <div class="fund-name" id="fundName">-</div>
                
                <div class="quote-grid">
                    <div class="quote-item">
                        <div class="quote-label">单位净值</div>
                        <div class="quote-value" id="dwjz">-</div>
                    </div>
                    <div class="quote-item">
                        <div class="quote-label">涨跌幅</div>
                        <div class="quote-value" id="zzjz">-</div>
                    </div>
                    <div class="quote-item">
                        <div class="quote-label">净值变化</div>
                        <div class="quote-value" id="changeDwjz">-</div>
                    </div>
                    <div class="quote-item">
                        <div class="quote-label">基金代码</div>
                        <div class="quote-value" id="code">-</div>
                    </div>
                </div>
                
                <!-- 更新时间 -->
                <div class="update-time" id="updateTime" style="display: none;">
                    更新时间：<span></span>
                </div>
                
                <!-- 业绩走势图表 -->
                <div class="chart-section">
                    <div class="chart-title">📊 业绩走势（涨跌幅）</div>
                    <div class="chart-tabs">
                        <button class="chart-tab" onclick="switchPeriod(30)">近1个月</button>
                        <button class="chart-tab" onclick="switchPeriod(90)">近3个月</button>
                        <button class="chart-tab" onclick="switchPeriod(180)">近6个月</button>
                        <button class="chart-tab active" onclick="switchPeriod(250)">近1年</button>
                    </div>
                    <div class="chart-container">
                        <div id="chart" style="width: 100%; height: 100%;"></div>
                    </div>
                </div>
                
                <!-- 历史净值列表 -->
                <div class="history-section">
                    <div class="history-title">📋 历史净值</div>
                    <div class="history-list" id="historyList"></div>
                </div>
            </div>
        </div>
        
        <!-- 导航 -->
        <div class="nav">
            <a href="/">🏠 首页 - 基金查询</a>
            <a href="/hold">💼 持仓管理</a>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        let historyData = [];
        let currentPeriod = 250;
        let chart = null;
        let currentFundCode = '';
        
        // 初始化图表
        function initChart() {
            const chartDom = document.getElementById('chart');
            chart = echarts.init(chartDom);
            
            // 响应式调整
            window.addEventListener('resize', () => {
                chart.resize();
            });
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            initChart();
        });
        
        // 切换时间周期
        function switchPeriod(days) {
            currentPeriod = days;
            
            // 更新按钮状态
            document.querySelectorAll('.chart-tab').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 重新查询数据
            if (currentFundCode) {
                queryFund(currentFundCode);
            }
        }
        
        // 表单提交
        document.getElementById('queryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fundCode = document.getElementById('fundCode').value.trim();
            
            if (!fundCode || !/^\d{6}$/.test(fundCode)) {
                showToast('请输入6位基金代码', 'error');
                return;
            }
            
            currentFundCode = fundCode;
            await queryFund(fundCode);
        });
        
        async function queryFund(fundCode) {
            showLoading();
            
            try {
                // 获取实时估值
                const quoteRes = await fetch('/api/fund/quote?fundCode=' + fundCode);
                const quoteData = await quoteRes.json();
                
                if (!quoteData.success) {
                    showError(quoteData.message || '未找到该基金');
                    return;
                }
                
                displayQuote(quoteData);
                
                // 获取历史数据（根据当前选择的时间周期）
                const historyRes = await fetch('/api/fund/history?fundCode=' + fundCode + '&days=' + currentPeriod);
                const history = await historyRes.json();
                
                historyData = history;
                displayHistory(history);
                
                showResult();
            } catch (e) {
                showError('查询失败: ' + e.message);
            } finally {
                hideLoading();
            }
        }
        
        function displayQuote(data) {
            document.getElementById('fundName').textContent = data.fundName || data.fundCode;
            document.getElementById('dwjz').textContent = data.dwjz || '-';
            document.getElementById('code').textContent = data.fundCode;
            
            const updateTimeEl = document.getElementById('updateTime');
            if (data.updateTime) {
                updateTimeEl.querySelector('span').textContent = data.updateTime;
                updateTimeEl.classList.add('show');
            } else {
                updateTimeEl.classList.remove('show');
            }
            
            const zzjz = data.zzjz;
            const zzjzEl = document.getElementById('zzjz');
            if (zzjz !== undefined && zzjz !== null) {
                const sign = zzjz >= 0 ? '+' : '';
                zzjzEl.textContent = sign + zzjz + '%';
                zzjzEl.className = 'quote-value ' + (zzjz >= 0 ? 'positive' : 'negative');
            } else {
                zzjzEl.textContent = '-';
                zzjzEl.className = 'quote-value';
            }
            
            const changeDwjz = data.changeDwjz;
            const changeDwjzEl = document.getElementById('changeDwjz');
            if (changeDwjz !== undefined && changeDwjz !== null) {
                const sign = changeDwjz >= 0 ? '+' : '';
                changeDwjzEl.textContent = sign + changeDwjz;
                changeDwjzEl.className = 'quote-value ' + (changeDwjz >= 0 ? 'positive' : 'negative');
            } else {
                changeDwjzEl.textContent = '-';
                changeDwjzEl.className = 'quote-value';
            }
        }
        
        // 绘制图表（使用ECharts）
        function drawChart() {
            if (!chart || !historyData || historyData.length === 0) return;
            
            // 数据反转（让日期从左到右递增）
            const chartData = [...historyData].reverse();
            
            const dates = chartData.map(d => d.date);
            const values = chartData.map(d => d.accumulatedChangeRate || 0);
            
            // 判断整体涨跌
            const isPositive = values[values.length - 1] >= 0;
            const lineColor = isPositive ? '#ef4444' : '#22c55e';
            const areaColor = isPositive 
                ? 'rgba(239, 68, 68, 0.15)' 
                : 'rgba(34, 197, 94, 0.15)';
            
            const option = {
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(255, 255, 255, 0.95)',
                    borderColor: '#e5e7eb',
                    borderWidth: 1,
                    textStyle: {
                        color: '#333'
                    },
                    formatter: function(params) {
                        const data = params[0];
                        const value = data.value;
                        const sign = value >= 0 ? '+' : '';
                        return `<strong>${data.name}</strong><br/>涨跌幅: ${sign}${value.toFixed(2)}%`;
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    top: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: dates,
                    boundaryGap: false,
                    axisLine: {
                        lineStyle: {
                            color: '#e5e7eb'
                        }
                    },
                    axisLabel: {
                        color: '#6b7280',
                        fontSize: 11,
                        interval: Math.floor(dates.length / 6)
                    }
                },
                yAxis: {
                    type: 'value',
                    axisLine: {
                        show: true,
                        lineStyle: {
                            color: '#e5e7eb'
                        }
                    },
                    axisLabel: {
                        color: '#6b7280',
                        formatter: function(value) {
                            const sign = value >= 0 ? '+' : '';
                            return sign + value.toFixed(1) + '%';
                        }
                    },
                    splitLine: {
                        lineStyle: {
                            color: '#f3f4f6'
                        }
                    }
                },
                dataZoom: [
                    {
                        type: 'inside',
                        start: 0,
                        end: 100
                    },
                    {
                        type: 'slider',
                        start: 0,
                        end: 100,
                        height: 20,
                        bottom: 10,
                        borderColor: '#e5e7eb',
                        backgroundColor: '#f9fafb',
                        fillerColor: 'rgba(102, 126, 234, 0.2)',
                        handleStyle: {
                            color: '#667eea'
                        },
                        textStyle: {
                            color: '#6b7280'
                        }
                    }
                ],
                series: [
                    {
                        name: '涨跌幅',
                        type: 'line',
                        data: values,
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: 6,
                        lineStyle: {
                            color: lineColor,
                            width: 2
                        },
                        itemStyle: {
                            color: lineColor,
                            borderColor: '#fff',
                            borderWidth: 2
                        },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: areaColor },
                                { offset: 1, color: 'rgba(255, 255, 255, 0)' }
                            ])
                        },
                        markLine: {
                            silent: true,
                            symbol: 'none',
                            data: [
                                {
                                    yAxis: 0,
                                    lineStyle: {
                                        color: '#9ca3af',
                                        type: 'dashed',
                                        width: 1
                                    }
                                }
                            ]
                        }
                    }
                ]
            };
            
            chart.setOption(option);
        }
        
        // 显示历史列表（带涨跌幅颜色）
        function displayHistory(data) {
            const container = document.getElementById('historyList');
            container.innerHTML = '';
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="history-item"><span style="color: #999;">暂无历史数据</span></div>';
                return;
            }
            
            // 绘制图表
            drawChart();
            
            // 列表按日期倒序（最新在前）
            const sortedData = [...data].reverse();
            
            sortedData.forEach(item => {
                const changeRate = item.changeRate || 0;
                const accumulatedRate = item.accumulatedChangeRate || 0;
                
                let changeClass = 'change-zero';
                if (changeRate > 0) changeClass = 'change-positive';
                else if (changeRate < 0) changeClass = 'change-negative';
                
                const changeSign = changeRate >= 0 ? '+' : '';
                
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span class="history-date">${item.dateFull || item.date}</span>
                    <span class="history-nav">${item.dwjz.toFixed(4)}</span>
                    <span class="history-change ${changeClass}">
                        ${changeSign}${changeRate.toFixed(2)}%
                    </span>
                `;
                container.appendChild(div);
            });
        }
        
        function showToast(message, type) {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').classList.remove('show');
            document.getElementById('error').style.display = 'none';
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
        
        function showError(msg) {
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
            document.getElementById('result').classList.remove('show');
        }
        
        function showResult() {
            document.getElementById('result').classList.add('show');
        }
    </script>
</body>
</html>
