<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 / 注册 - 江财基金</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        .auth-card h1 {
            text-align: center;
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 8px;
        }

        .auth-card .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #eee;
            margin-bottom: 28px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            font-size: 1rem;
            cursor: pointer;
            color: #888;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 6px;
        }

        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .msg {
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        .msg.error { background: #fff0f0; color: #e53e3e; border: 1px solid #fed7d7; }
        .msg.success { background: #f0fff4; color: #276749; border: 1px solid #c6f6d5; }

        .panel { display: none; }
        .panel.active { display: block; }
    </style>
</head>
<body>
<div class="auth-card">
    <h1>🌱 江财基金</h1>
    <p class="subtitle">您的个人理财助手</p>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">登录</button>
        <button class="tab-btn" onclick="switchTab('register')">注册</button>
    </div>

    <!-- 登录面板 -->
    <div id="loginPanel" class="panel active">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <button class="btn-submit" onclick="doLogin()">登 录</button>
        <div id="loginMsg" class="msg"></div>
    </div>

    <!-- 注册面板 -->
    <div id="registerPanel" class="panel">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="regUsername" placeholder="3-20个字符" autocomplete="username">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="regPassword" placeholder="至少6位" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label>邮箱（选填）</label>
            <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email">
        </div>
        <button class="btn-submit" onclick="doRegister()">注 册</button>
        <div id="registerMsg" class="msg"></div>
    </div>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach((b, i) => {
            b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
        });
        document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
        document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
    }

    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = 'msg ' + type;
        el.style.display = 'block';
    }

    async function doLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) { showMsg('loginMsg', '请填写用户名和密码', 'error'); return; }

        const btn = document.querySelector('#loginPanel .btn-submit');
        btn.disabled = true;
        try {
            const resp = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await resp.json();
            if (data.success) {
                localStorage.setItem('jwtToken', data.token);
                localStorage.setItem('username', data.username);
                localStorage.setItem('userId', data.userId);
                showMsg('loginMsg', '登录成功，跳转中…', 'success');
                setTimeout(() => window.location.href = '/', 800);
            } else {
                showMsg('loginMsg', data.message || '用户名或密码错误', 'error');
            }
        } catch (e) {
            showMsg('loginMsg', '网络错误，请重试', 'error');
        } finally {
            btn.disabled = false;
        }
    }

    async function doRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const email = document.getElementById('regEmail').value.trim();
        if (!username || !password) { showMsg('registerMsg', '请填写用户名和密码', 'error'); return; }
        if (username.length < 3) { showMsg('registerMsg', '用户名至少3个字符', 'error'); return; }
        if (password.length < 6) { showMsg('registerMsg', '密码至少6位', 'error'); return; }

        const btn = document.querySelector('#registerPanel .btn-submit');
        btn.disabled = true;
        try {
            const resp = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, email: email || null })
            });
            const data = await resp.json();
            if (data.success) {
                localStorage.setItem('jwtToken', data.token);
                localStorage.setItem('username', data.username);
                localStorage.setItem('userId', data.userId);
                showMsg('registerMsg', '注册成功，跳转中…', 'success');
                setTimeout(() => window.location.href = '/', 800);
            } else {
                showMsg('registerMsg', data.message || '注册失败', 'error');
            }
        } catch (e) {
            showMsg('registerMsg', '网络错误，请重试', 'error');
        } finally {
            btn.disabled = false;
        }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            const loginActive = document.getElementById('loginPanel').classList.contains('active');
            loginActive ? doLogin() : doRegister();
        }
    });

    // Auto-switch to register tab if URL contains /register
    if (window.location.pathname === '/register') switchTab('register');
</script>
</body>
</html>
