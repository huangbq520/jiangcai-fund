<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>持仓管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        /* 持仓概览卡片 */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        .overview-card {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            color: white;
            text-align: center;
        }
        
        .overview-card:nth-child(2) {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .overview-card:nth-child(3) {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .overview-card:nth-child(4) {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }
        
        .overview-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        
        .overview-value {
            font-size: 1.8rem;
            font-weight: 700;
        }
        
        /* 表单区域 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            font-size: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            border-color: #11998e;
        }
        
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.3);
        }
        
        .btn-secondary {
            background: #6c757d;
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.3);
        }
        
        .btn-danger {
            background: #dc3545;
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        /* 持仓明细表格 */
        .table-container {
            overflow-x: auto;
        }
        
        .holdings-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }
        
        .holdings-table th,
        .holdings-table td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        
        .holdings-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        
        .holdings-table td {
            font-size: 0.85rem;
            color: #555;
        }
        
        .holdings-table tr:hover {
            background: #f8f9fa;
        }
        
        /* 排序按钮 */
        .sort-btns {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .sort-btn {
            padding: 6px 12px;
            font-size: 12px;
            background: #e9ecef;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .sort-btn:hover, .sort-btn.active {
            background: #11998e;
            color: white;
        }
        
        /* 涨跌颜色 */
        .profit-positive {
            color: #e74c3c;
            font-weight: 600;
        }
        
        .profit-negative {
            color: #27ae60;
            font-weight: 600;
        }
        
        /* 持仓占比进度条 */
        .progress-bar {
            width: 60px;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-right: 5px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #11998e, #38ef7d);
            border-radius: 4px;
        }
        
        .action-btns {
            display: flex;
            gap: 5px;
            justify-content: center;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        .nav a {
            display: inline-block;
            padding: 12px 30px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            transition: background 0.3s;
        }
        
        .nav a:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .refresh-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: 80%;
            text-align: center;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .toast.success {
            background: #27ae60;
        }
        
        .toast.error {
            background: #e74c3c;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 基金持仓管理</h1>
            <p>实时估值 · 智能持仓 · 收益分析</p>
            <div style="margin-top:10px;font-size:0.95rem;">
                👤 <span id="usernameDisplay"></span>
                &nbsp;|&nbsp;
                <a href="#" onclick="logout()" style="color:rgba(255,255,255,0.85);text-decoration:underline;">退出登录</a>
            </div>
        </div>
        
        <!-- 持仓概览 -->
        <div class="card">
            <div class="card-title">💰 持仓概览</div>
            <div class="overview-grid">
                <div class="overview-card">
                    <div class="overview-label">账户总资产</div>
                    <div class="overview-value" id="totalAssets">-</div>
                </div>
                <div class="overview-card">
                    <div class="overview-label">持有基金数</div>
                    <div class="overview-value" id="fundCount">-</div>
                </div>
                <div class="overview-card">
                    <div class="overview-label">当日收益</div>
                    <div class="overview-value" id="dailyReturn">-</div>
                </div>
                <div class="overview-card">
                    <div class="overview-label">累计收益</div>
                    <div class="overview-value" id="totalProfit">-</div>
                </div>
            </div>
        </div>
        
        <!-- 买入/卖出表单 -->
        <div class="card">
            <div class="card-title">📈 买入/卖出</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>基金代码（6位数字）</label>
                    <input type="text" id="fundCode" placeholder="例如: 161039" maxlength="6">
                </div>
                <div class="form-group">
                    <label>买入/卖出份额</label>
                    <input type="number" id="amount" placeholder="请输入份额" step="0.01" min="0.01">
                </div>
                <div class="form-group">
                    <label>价格（可选，默认实时估值）</label>
                    <input type="number" id="price" placeholder="例如: 1.5234" step="0.0001">
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="addHolding()">买入</button>
                <button class="btn btn-danger" onclick="sellHolding()">卖出</button>
                <button class="btn btn-secondary" onclick="clearForm()">清空</button>
            </div>
        </div>
        
        <!-- 持仓明细 -->
        <div class="card">
            <div class="card-title">📋 持仓明细</div>
            <div class="refresh-btn">
                <div class="sort-btns">
                    <button class="sort-btn active" onclick="sortBy('positionRatio')">按持仓占比</button>
                    <button class="sort-btn" onclick="sortBy('dailyReturn')">按当日收益</button>
                    <button class="sort-btn" onclick="sortBy('profitLoss')">按持有收益</button>
                    <button class="sort-btn" onclick="sortBy('fundCode')">按基金代码</button>
                </div>
                <button class="btn btn-primary btn-sm" onclick="loadPortfolioOverview()">🔄 刷新最新净值</button>
            </div>
            
            <div class="table-container">
                <table class="holdings-table">
                    <thead>
                        <tr>
                            <th>基金代码</th>
                            <th>基金名称</th>
                            <th>持有份额</th>
                            <th>成本价</th>
                            <th>当前净值</th>
                            <th>当日收益</th>
                            <th>当日涨跌</th>
                            <th>持有收益</th>
                            <th>持仓占比</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="holdingsTable">
                        <tr>
                            <td colspan="10" class="loading">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 导航 -->
        <div class="nav">
            <a href="/">🏠 首页 - 基金查询</a>
            <a href="/hold">💼 持仓管理</a>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        let portfolioData = null;
        let currentSort = { field: 'positionRatio', desc: true };

        // JWT 辅助函数
        function getToken() { return localStorage.getItem('jwtToken'); }
        function authHeaders() {
            const t = getToken();
            return t ? { 'Authorization': 'Bearer ' + t } : {};
        }
        async function authFetch(url, opts = {}) {
            opts.headers = Object.assign({}, opts.headers || {}, authHeaders());
            const res = await fetch(url, opts);
            if (res.status === 401) { window.location.href = '/login'; throw new Error('未登录'); }
            return res;
        }

        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', function() {
            if (!getToken()) { window.location.href = '/login'; return; }
            // 显示用户名
            const uname = localStorage.getItem('username');
            if (uname) document.getElementById('usernameDisplay').textContent = uname;
            loadPortfolioOverview();
        });

        // 退出登录
        function logout() {
            localStorage.removeItem('jwtToken');
            localStorage.removeItem('username');
            localStorage.removeItem('userId');
            window.location.href = '/login';
        }

        // 加载持仓概览数据
        async function loadPortfolioOverview() {
            try {
                // const res = await fetch('/api/hold/overview');
                const res = await authFetch('/api/hold/overview');
                const data = await res.json();
                
                if (data.success) {
                    portfolioData = data.data;
                    updateOverviewCards(data.data);
                    updateHoldingsTable(data.data.holdings || []);
                } else {
                    showToast(data.message || '加载失败', 'error');
                }
            } catch (e) {
                console.error('加载持仓概览失败', e);
                showToast('加载失败: ' + e.message, 'error');
            }
        }
        
        // 更新概览卡片
        function updateOverviewCards(data) {
            document.getElementById('totalAssets').textContent = '¥' + data.totalAssets;
            document.getElementById('fundCount').textContent = data.fundCount || 0;
            
            const dailyReturnEl = document.getElementById('dailyReturn');
            const dailyReturn = parseFloat(data.dailyReturn) || 0;
            dailyReturnEl.textContent = formatCurrency(dailyReturn);
            dailyReturnEl.className = 'overview-value ' + (dailyReturn >= 0 ? 'profit-positive' : 'profit-negative');
            
            const totalProfitEl = document.getElementById('totalProfit');
            const totalProfit = parseFloat(data.totalProfitLoss) || 0;
            totalProfitEl.textContent = formatCurrency(totalProfit);
            totalProfitEl.className = 'overview-value ' + (totalProfit >= 0 ? 'profit-positive' : 'profit-negative');
        }
        
        // 更新持仓明细表格
        function updateHoldingsTable(holdings) {
            const tbody = document.getElementById('holdingsTable');
            
            if (!holdings || holdings.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="empty-state">暂无持仓，请先买入基金</td></tr>';
                return;
            }
            
            // 排序
            const sorted = [...holdings].sort((a, b) => {
                let aVal = a[currentSort.field] || 0;
                let bVal = b[currentSort.field] || 0;
                if (currentSort.desc) {
                    return bVal - aVal;
                }
                return aVal - bVal;
            });
            
            tbody.innerHTML = sorted.map(h => {
                const dailyReturn = parseFloat(h.dailyReturn) || 0;
                const dailyChangeRate = parseFloat(h.dailyChangeRate) || 0;
                const profitLoss = parseFloat(h.profitLoss) || 0;
                const profitRate = parseFloat(h.profitRate) || 0;
                const positionRatio = parseFloat(h.positionRatio) || 0;
                
                return `
                    <tr>
                        <td><strong>${h.fundCode || '-'}</strong></td>
                        <td>${h.fundName || '-'}</td>
                        <td>${formatNumber(h.holdingAmount)}</td>
                        <td>${formatNumber(h.costPrice)}</td>
                        <td>${formatNumber(h.currentPrice)}</td>
                        <td class="${dailyReturn >= 0 ? 'profit-positive' : 'profit-negative'}">
                            ${formatCurrency(dailyReturn)}
                        </td>
                        <td class="${dailyChangeRate >= 0 ? 'profit-positive' : 'profit-negative'}">
                            ${dailyChangeRate >= 0 ? '+' : ''}${dailyChangeRate.toFixed(2)}%
                        </td>
                        <td class="${profitLoss >= 0 ? 'profit-positive' : 'profit-negative'}">
                            ${formatCurrency(profitLoss)}<br>
                            <small>(${profitRate >= 0 ? '+' : ''}${profitRate.toFixed(2)}%)</small>
                        </td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${positionRatio}%"></div>
                            </div>
                            ${positionRatio.toFixed(1)}%
                        </td>
                        <td class="action-btns">
                            <button class="btn btn-danger btn-sm" onclick="deleteHolding('${h.fundCode}')">删除</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        // 排序
        function sortBy(field) {
            // 切换排序方向
            if (currentSort.field === field) {
                currentSort.desc = !currentSort.desc;
            } else {
                currentSort.field = field;
                currentSort.desc = true;
            }
            
            // 更新按钮状态
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(getSortLabel(field))) {
                    btn.classList.add('active');
                }
            });
            
            // 重新渲染表格
            if (portfolioData && portfolioData.holdings) {
                updateHoldingsTable(portfolioData.holdings);
            }
        }
        
        function getSortLabel(field) {
            const labels = {
                'positionRatio': '持仓占比',
                'dailyReturn': '当日收益',
                'profitLoss': '持有收益',
                'fundCode': '基金代码'
            };
            return labels[field] || field;
        }
        
        // 格式化货币
        function formatCurrency(num) {
            if (num === null || num === undefined) return '¥0.00';
            const value = parseFloat(num);
            const sign = value >= 0 ? '+' : '-';
            return '¥' + sign + Math.abs(value).toFixed(2);
        }
        
        // 格式化数字
        function formatNumber(num) {
            if (num === null || num === undefined) return '-';
            return parseFloat(num).toFixed(4);
        }
        
        // 验证基金代码
        function validateFundCode(code) {
            return /^\d{6}$/.test(code);
        }
        
        // 显示Toast
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // 买入
        async function addHolding() {
            const fundCode = document.getElementById('fundCode').value.trim();
            const amount = document.getElementById('amount').value;
            const price = document.getElementById('price').value;
            
            if (!fundCode) {
                showToast('请输入基金代码', 'error');
                return;
            }
            
            if (!validateFundCode(fundCode)) {
                showToast('基金代码必须是6位数字', 'error');
                return;
            }
            
            if (!amount || parseFloat(amount) <= 0) {
                showToast('请输入有效的买入份额', 'error');
                return;
            }
            
            const params = new URLSearchParams();
            params.append('fundCode', fundCode);
            params.append('amount', amount);
            if (price) params.append('price', price);
            
            try {
                // const res = await fetch('/api/hold/add?' + params.toString(), { method: 'POST' });
                const res = await authFetch('/api/hold/add?' + params.toString(), { method: 'POST' });
                const data = await res.json();
                
                if (data.success) {
                    showToast('买入成功', 'success');
                    loadPortfolioOverview();
                    clearForm();
                } else {
                    showToast(data.message || '买入失败', 'error');
                }
            } catch (e) {
                showToast('买入失败: ' + e.message, 'error');
            }
        }
        
        // 卖出
        async function sellHolding() {
            const fundCode = document.getElementById('fundCode').value.trim();
            const amount = document.getElementById('amount').value;
            
            if (!fundCode || !validateFundCode(fundCode)) {
                showToast('请输入有效的基金代码', 'error');
                return;
            }
            
            if (!amount || parseFloat(amount) <= 0) {
                showToast('请输入有效的卖出份额', 'error');
                return;
            }
            
            try {
                const res = await authFetch('/api/hold/sell?fundCode=' + fundCode + '&amount=' + amount, {
                    method: 'POST'
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast('卖出成功', 'success');
                    loadPortfolioOverview();
                    clearForm();
                } else {
                    showToast(data.message || '卖出失败', 'error');
                }
            } catch (e) {
                showToast('卖出失败: ' + e.message, 'error');
            }
        }
        
        // 删除持仓
        async function deleteHolding(fundCode) {
            if (!confirm('确定要删除该持仓吗？')) return;
            
            try {
                const res = await fetch('/api/hold/delete?fundCode=' + fundCode, { method: 'POST' });
                const data = await res.json();
                
                if (data.success) {
                    showToast('删除成功', 'success');
                    loadPortfolioOverview();
                } else {
                    showToast(data.message || '删除失败', 'error');
                }
            } catch (e) {
                showToast('删除失败: ' + e.message, 'error');
            }
        }
        
        function clearForm() {
            document.getElementById('fundCode').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('price').value = '';
        }
    </script>
</body>
</html>
