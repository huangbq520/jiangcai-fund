<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>持仓管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            font-size: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            border-color: #11998e;
        }
        
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.3);
        }
        
        .btn-primary:hover {
            box-shadow: 0 8px 20px rgba(17, 153, 142, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.3);
        }
        
        .btn-danger {
            background: #dc3545;
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .summary-item {
            padding: 15px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 10px;
            text-align: center;
        }
        
        .summary-label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
        }
        
        .summary-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
        }
        
        .summary-value.positive {
            color: #e74c3c;
        }
        
        .summary-value.negative {
            color: #27ae60;
        }
        
        .holdings-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .holdings-table th,
        .holdings-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .holdings-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }
        
        .holdings-table td {
            font-size: 0.9rem;
            color: #555;
        }
        
        .holdings-table tr:hover {
            background: #f8f9fa;
        }
        
        .profit-positive {
            color: #e74c3c;
            font-weight: 600;
        }
        
        .profit-negative {
            color: #27ae60;
            font-weight: 600;
        }
        
        .action-btns {
            display: flex;
            gap: 5px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        .nav a {
            display: inline-block;
            padding: 12px 30px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            transition: background 0.3s;
        }
        
        .nav a:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .refresh-btn {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        
        .sort-btns {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .sort-btn {
            padding: 6px 12px;
            font-size: 12px;
            background: #e9ecef;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .sort-btn:hover, .sort-btn.active {
            background: #11998e;
            color: white;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: 80%;
            text-align: center;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .toast.success {
            background: #27ae60;
        }
        
        .toast.error {
            background: #e74c3c;
        }
        
        .tooltip {
            position: absolute;
            background: #333;
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            z-index: 100;
            display: none;
        }
        
        .tooltip.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💼 持仓管理</h1>
            <p>管理您的基金持仓，查看收益情况</p>
        </div>
        
        <div class="card">
            <div class="card-title">➕ 买入/卖出</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>基金代码</label>
                    <input type="text" id="fundCode" placeholder="如：161039">
                </div>
                <div class="form-group">
                    <label>份额/金额</label>
                    <input type="number" id="amount" placeholder="请输入份额" step="0.01">
                </div>
                <div class="form-group">
                    <label>价格（可选）</label>
                    <input type="number" id="price" placeholder="默认查询实时净值" step="0.0001">
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="addHolding()">买入</button>
                <button class="btn btn-danger" onclick="sellHolding()">卖出</button>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">📊 持仓概览</div>
            <div class="summary-grid">
                <div class="summary-item">
                    <div class="summary-label">持有基金数</div>
                    <div class="summary-value" id="totalFunds">0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">总市值</div>
                    <div class="summary-value" id="totalValue">0.00</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">总成本</div>
                    <div class="summary-value" id="totalCost">0.00</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">总盈亏</div>
                    <div class="summary-value" id="totalProfit">0.00</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">📋 持仓明细</div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <div class="sort-btns">
                    <button class="sort-btn active" onclick="sortHoldings('default')">默认</button>
                    <button class="sort-btn" onclick="sortHoldings('profitRate')">按盈亏比例</button>
                    <button class="sort-btn" onclick="sortHoldings('currentValue')">按持仓金额</button>
                </div>
                <button class="btn btn-secondary btn-sm" onclick="refreshHoldings()">🔄 刷新最新净值</button>
            </div>
            <div id="message"></div>
            <table class="holdings-table">
                <thead>
                    <tr>
                        <th>基金代码</th>
                        <th>基金名称</th>
                        <th>持有份额</th>
                        <th>成本价</th>
                        <th>当前净值</th>
                        <th>总成本</th>
                        <th>当前市值</th>
                        <th>盈亏金额</th>
                        <th>盈亏比例</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="holdingsTable">
                </tbody>
            </table>
            <div id="emptyState" class="empty-state">
                暂无持仓，请先买入基金
            </div>
        </div>
        
        <div class="nav">
            <a href="/">基金查询</a>
            <a href="/hold">持仓管理</a>
        </div>
    </div>
    
    <script>
        let currentHoldings = [];
        let currentSort = 'default';
        
        // 页面加载时获取持仓列表
        document.addEventListener('DOMContentLoaded', function() {
            loadHoldings();
        });
        
        async function loadHoldings() {
            try {
                const res = await fetch('/api/hold/list');
                const data = await res.json();
                
                if (data.success) {
                    currentHoldings = data.data;
                    displayHoldings(currentHoldings);
                } else {
                    showToast(data.message || '加载失败', 'error');
                }
            } catch (e) {
                showToast('加载失败: ' + e.message, 'error');
            }
        }
        
        function sortHoldings(sortType) {
            currentSort = sortType;
            
            // 更新按钮状态
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            let sorted = [...currentHoldings];
            
            switch(sortType) {
                case 'profitRate':
                    sorted.sort((a, b) => (b.profitRate || 0) - (a.profitRate || 0));
                    break;
                case 'currentValue':
                    sorted.sort((a, b) => (b.currentValue || 0) - (a.currentValue || 0));
                    break;
                default:
                    // 保持原顺序
                    break;
            }
            
            displayHoldings(sorted);
        }
        
        function displayHoldings(holdings) {
            const tbody = document.getElementById('holdingsTable');
            const emptyState = document.getElementById('emptyState');
            
            tbody.innerHTML = '';
            
            if (!holdings || holdings.length === 0) {
                emptyState.style.display = 'block';
                updateSummary(0, 0, 0, 0);
                return;
            }
            
            emptyState.style.display = 'none';
            
            let totalValue = 0;
            let totalCost = 0;
            
            holdings.forEach(h => {
                totalValue += parseFloat(h.currentValue || 0);
                totalCost += parseFloat(h.totalCost || 0);
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${h.fundCode}</td>
                    <td>${h.fundName || '-'}</td>
                    <td>${formatNumber(h.holdingAmount)}</td>
                    <td>${formatNumber(h.costPrice)}</td>
                    <td>${formatNumber(h.currentPrice)}</td>
                    <td>${formatNumber(h.totalCost)}</td>
                    <td>${formatNumber(h.currentValue)}</td>
                    <td class="${h.profitLoss >= 0 ? 'profit-positive' : 'profit-negative'}">
                        ${formatProfit(h.profitLoss)}
                    </td>
                    <td class="${h.profitLoss >= 0 ? 'profit-positive' : 'profit-negative'}">
                        ${formatProfitRate(h.profitRate)}
                    </td>
                    <td class="action-btns">
                        <button class="btn btn-danger btn-sm" onclick="deleteHolding('${h.fundCode}')">删除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            const totalProfit = totalValue - totalCost;
            updateSummary(holdings.length, totalValue, totalCost, totalProfit);
        }
        
        function updateSummary(count, value, cost, profit) {
            document.getElementById('totalFunds').textContent = count;
            document.getElementById('totalValue').textContent = formatNumber(value);
            document.getElementById('totalCost').textContent = formatNumber(cost);
            
            const profitEl = document.getElementById('totalProfit');
            profitEl.textContent = formatProfit(profit);
            profitEl.className = 'summary-value ' + (profit >= 0 ? 'positive' : 'negative');
        }
        
        function formatNumber(num) {
            if (num === null || num === undefined) return '-';
            return parseFloat(num).toFixed(2);
        }
        
        function formatProfit(num) {
            if (num === null || num === undefined) return '-';
            const value = parseFloat(num);
            const sign = value >= 0 ? '+' : '';
            return sign + value.toFixed(2);
        }
        
        function formatProfitRate(num) {
            if (num === null || num === undefined) return '-';
            const value = parseFloat(num);
            const sign = value >= 0 ? '+' : '';
            return sign + value.toFixed(2) + '%';
        }
        
        // 验证基金代码（6位数字）
        function validateFundCode(code) {
            return /^\d{6}$/.test(code);
        }
        
        // 显示Toast提示
        function showToast(message, type) {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // 自动填充持有份额（卖出时）
        async function onFundCodeChange() {
            const fundCode = document.getElementById('fundCode').value.trim();
            if (fundCode && validateFundCode(fundCode)) {
                try {
                    const res = await fetch('/api/hold/list');
                    const data = await res.json();
                    
                    if (data.success && data.data) {
                        const holding = data.data.find(h => h.fundCode === fundCode);
                        if (holding) {
                            // 显示当前持有份额的提示
                            document.getElementById('amount').placeholder = `当前持有: ${holding.holdingAmount} 份`;
                        } else {
                            document.getElementById('amount').placeholder = '请输入份额';
                        }
                    }
                } catch (e) {
                    console.error('获取持仓信息失败', e);
                }
            }
        }
        
        document.getElementById('fundCode').addEventListener('blur', onFundCodeChange);
        
        async function addHolding() {
            const fundCode = document.getElementById('fundCode').value.trim();
            const amount = document.getElementById('amount').value;
            const price = document.getElementById('price').value;
            
            // 验证基金代码
            if (!fundCode) {
                showToast('请输入基金代码', 'error');
                return;
            }
            
            if (!validateFundCode(fundCode)) {
                showToast('基金代码必须是6位数字', 'error');
                return;
            }
            
            // 验证份额
            if (!amount || parseFloat(amount) <= 0) {
                showToast('请输入有效的买入份额（必须大于0）', 'error');
                return;
            }
            
            const params = new URLSearchParams();
            params.append('fundCode', fundCode);
            params.append('amount', amount);
            if (price) {
                params.append('price', price);
            }
            
            try {
                const res = await fetch('/api/hold/add?' + params.toString(), {
                    method: 'POST'
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast(data.message || '买入成功', 'success');
                    loadHoldings();
                    clearForm();
                } else {
                    showToast(data.message || '买入失败', 'error');
                }
            } catch (e) {
                showToast('买入失败: ' + e.message, 'error');
            }
        }
        
        async function sellHolding() {
            const fundCode = document.getElementById('fundCode').value.trim();
            const amount = document.getElementById('amount').value;
            
            // 验证基金代码
            if (!fundCode) {
                showToast('请输入基金代码', 'error');
                return;
            }
            
            if (!validateFundCode(fundCode)) {
                showToast('基金代码必须是6位数字', 'error');
                return;
            }
            
            // 验证份额
            if (!amount || parseFloat(amount) <= 0) {
                showToast('请输入有效的卖出份额（必须大于0）', 'error');
                return;
            }
            
            // 获取当前持仓检查可卖数量
            try {
                const res = await fetch('/api/hold/list');
                const data = await res.json();
                
                if (data.success && data.data) {
                    const holding = data.data.find(h => h.fundCode === fundCode);
                    if (holding) {
                        const sellAmount = parseFloat(amount);
                        if (sellAmount > parseFloat(holding.holdingAmount)) {
                            showToast('卖出份额不能超过持有份额 ' + holding.holdingAmount, 'error');
                            return;
                        }
                    }
                }
            } catch (e) {
                console.error('检查持仓失败', e);
            }
            
            try {
                const res = await fetch('/api/hold/sell?fundCode=' + fundCode + '&amount=' + amount, {
                    method: 'POST'
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast(data.message || '卖出成功', 'success');
                    loadHoldings();
                    clearForm();
                } else {
                    showToast(data.message || '卖出失败', 'error');
                }
            } catch (e) {
                showToast('卖出失败: ' + e.message, 'error');
            }
        }
        
        async function deleteHolding(fundCode) {
            if (!confirm('确定要删除该持仓吗？')) {
                return;
            }
            
            try {
                const res = await fetch('/api/hold/delete?fundCode=' + fundCode, {
                    method: 'POST'
                });
                const data = await res.json();
                
                if (data.success) {
                    showMessage(data.message || '删除成功', 'success');
                    loadHoldings();
                } else {
                    showMessage(data.message || '删除失败', 'error');
                }
            } catch (e) {
                showMessage('删除失败: ' + e.message, 'error');
            }
        }
        
        async function refreshHoldings() {
            showMessage('正在刷新...', 'success');
            
            try {
                const res = await fetch('/api/hold/refresh', {
                    method: 'POST'
                });
                const data = await res.json();
                
                if (data.success) {
                    showMessage('刷新成功', 'success');
                    loadHoldings();
                } else {
                    showMessage(data.message || '刷新失败', 'error');
                }
            } catch (e) {
                showMessage('刷新失败: ' + e.message, 'error');
            }
        }
        
        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = 'message ' + type;
            
            setTimeout(() => {
                el.className = 'message';
            }, 3000);
        }
        
        function clearForm() {
            document.getElementById('fundCode').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('price').value = '';
        }
    </script>
</body>
</html>
